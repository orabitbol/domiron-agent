<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="c-bg" cx="50%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#060504"/>
    </radialGradient>
    <radialGradient id="c-crown" cx="50%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="c-rays" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#d4a843" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#c-bg)"/>
  <rect width="800" height="800" fill="url(#c-crown)"/>
  <!-- Radiant lines from crown -->
  <line x1="400" y1="80" x2="100" y2="600" stroke="#d4a843" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="80" x2="200" y2="700" stroke="#d4a843" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="80" x2="600" y2="700" stroke="#d4a843" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="80" x2="700" y2="600" stroke="#d4a843" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="80" x2="400" y2="750" stroke="#d4a843" stroke-width="0.5" opacity="0.03"/>
  <!-- Crown silhouette -->
  <polygon points="300,180 320,100 360,150 400,80 440,150 480,100 500,180" fill="#0d0a04" opacity="0.5" stroke="#d4a843" stroke-width="1" stroke-opacity="0.1"/>
  <rect x="300" y="180" width="200" height="20" rx="3" fill="#0d0a04" opacity="0.4" stroke="#d4a843" stroke-width="0.5" stroke-opacity="0.08"/>
  <!-- Crown jewels -->
  <circle cx="400" cy="90" r="4" fill="#d4a843" opacity="0.12"/>
  <circle cx="360" cy="145" r="3" fill="#f0c85a" opacity="0.08"/>
  <circle cx="440" cy="145" r="3" fill="#f0c85a" opacity="0.08"/>
  <!-- Leaderboard podium -->
  <rect x="280" y="550" width="100" height="250" fill="#0d0a04" opacity="0.5"/>
  <rect x="420" y="600" width="100" height="200" fill="#0d0a04" opacity="0.4"/>
  <rect x="140" y="650" width="100" height="150" fill="#0d0a04" opacity="0.35"/>
  <!-- Podium numbers -->
  <text x="330" y="540" font-size="28" font-weight="900" fill="#d4a843" opacity="0.08" text-anchor="middle" font-family="Arial">1</text>
  <text x="470" y="590" font-size="22" font-weight="900" fill="#d4a843" opacity="0.06" text-anchor="middle" font-family="Arial">2</text>
  <text x="190" y="640" font-size="20" font-weight="900" fill="#d4a843" opacity="0.05" text-anchor="middle" font-family="Arial">3</text>
  <!-- Ascending bars (leaderboard feel) -->
  <rect x="580" y="400" width="20" height="200" fill="#d4a843" opacity="0.03"/>
  <rect x="610" y="350" width="20" height="250" fill="#d4a843" opacity="0.04"/>
  <rect x="640" y="300" width="20" height="300" fill="#d4a843" opacity="0.05"/>
  <rect x="670" y="250" width="20" height="350" fill="#d4a843" opacity="0.04"/>
</svg>
