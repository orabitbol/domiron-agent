<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="s-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080e18"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <radialGradient id="s-eye" cx="50%" cy="45%" r="25%">
      <stop offset="0%" stop-color="#4a9ee8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a9ee8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s-fog" cx="50%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#0a1525" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1525" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#s-bg)"/>
  <rect width="800" height="800" fill="url(#s-eye)"/>
  <!-- Target rings -->
  <circle cx="400" cy="360" r="120" fill="none" stroke="#4a9ee8" stroke-width="1" opacity="0.06"/>
  <circle cx="400" cy="360" r="80" fill="none" stroke="#4a9ee8" stroke-width="1" opacity="0.08"/>
  <circle cx="400" cy="360" r="40" fill="none" stroke="#4a9ee8" stroke-width="1" opacity="0.1"/>
  <circle cx="400" cy="360" r="6" fill="#4a9ee8" opacity="0.1"/>
  <!-- Crosshair lines -->
  <line x1="400" y1="200" x2="400" y2="520" stroke="#4a9ee8" stroke-width="0.5" opacity="0.06"/>
  <line x1="240" y1="360" x2="560" y2="360" stroke="#4a9ee8" stroke-width="0.5" opacity="0.06"/>
  <!-- Shadow figure silhouette -->
  <ellipse cx="400" cy="750" rx="60" ry="12" fill="#000" opacity="0.3"/>
  <path d="M370,750 L375,620 Q380,580 400,570 Q420,580 425,620 L430,750 Z" fill="#050810" opacity="0.5"/>
  <circle cx="400" cy="545" r="22" fill="#050810" opacity="0.5"/>
  <!-- Hooded cloak outline -->
  <path d="M365,580 Q400,530 435,580" fill="none" stroke="#4a9ee8" stroke-width="0.5" opacity="0.08"/>
  <!-- Data points / intel markers -->
  <rect x="150" cy="250" width="4" height="4" fill="#4a9ee8" opacity="0.15" transform="rotate(45 152 252)"/>
  <rect x="640" cy="300" width="4" height="4" fill="#4a9ee8" opacity="0.12" transform="rotate(45 642 302)"/>
  <rect x="250" cy="500" width="3" height="3" fill="#4a9ee8" opacity="0.1" transform="rotate(45 251.5 501.5)"/>
  <rect x="580" cy="480" width="3" height="3" fill="#4a9ee8" opacity="0.12" transform="rotate(45 581.5 481.5)"/>
  <!-- Scan lines -->
  <line x1="0" y1="250" x2="800" y2="250" stroke="#4a9ee8" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#4a9ee8" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="650" x2="800" y2="650" stroke="#4a9ee8" stroke-width="0.3" opacity="0.03"/>
  <!-- Bottom fog -->
  <rect width="800" height="800" fill="url(#s-fog)"/>
</svg>
