<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="b-bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#060208"/>
    </radialGradient>
    <radialGradient id="b-fire" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#ff2200" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b-fire2" cx="30%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b-smoke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#180505" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#180505" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#b-bg)"/>
  <rect width="800" height="800" fill="url(#b-fire)"/>
  <rect width="800" height="800" fill="url(#b-fire2)"/>
  <!-- Fortress silhouettes -->
  <polygon points="0,800 0,520 60,520 60,480 90,480 90,420 120,420 120,480 160,480 160,520 200,520 200,580 260,580 260,800" fill="#0d0304" opacity="0.7"/>
  <polygon points="540,800 540,560 580,560 580,500 620,440 660,500 660,560 700,560 700,480 730,480 730,440 760,440 760,480 800,480 800,800" fill="#0d0304" opacity="0.7"/>
  <!-- Crossing swords -->
  <line x1="300" y1="200" x2="520" y2="450" stroke="#c93545" stroke-width="3" opacity="0.15"/>
  <line x1="520" y1="200" x2="300" y2="450" stroke="#c93545" stroke-width="3" opacity="0.15"/>
  <!-- Scattered embers -->
  <circle cx="200" cy="300" r="2" fill="#ff4400" opacity="0.3"/>
  <circle cx="380" cy="180" r="1.5" fill="#ff6600" opacity="0.25"/>
  <circle cx="550" cy="350" r="2" fill="#ff3300" opacity="0.2"/>
  <circle cx="650" cy="250" r="1" fill="#ff5500" opacity="0.35"/>
  <circle cx="150" cy="450" r="1.5" fill="#ff4400" opacity="0.2"/>
  <circle cx="420" cy="520" r="2" fill="#ff2200" opacity="0.15"/>
  <circle cx="700" cy="400" r="1" fill="#ff6600" opacity="0.25"/>
  <!-- Smoke from top -->
  <rect width="800" height="320" fill="url(#b-smoke)"/>
  <!-- Ground fire glow -->
  <ellipse cx="400" cy="780" rx="350" ry="80" fill="#ff2200" opacity="0.06"/>
</svg>
