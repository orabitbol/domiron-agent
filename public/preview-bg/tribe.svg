<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="t-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#120818"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <radialGradient id="t-ritual" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#9b6bf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9b6bf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-torch1" cx="20%" cy="50%" r="15%">
      <stop offset="0%" stop-color="#9b6bf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9b6bf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t-torch2" cx="80%" cy="50%" r="15%">
      <stop offset="0%" stop-color="#9b6bf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9b6bf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#t-bg)"/>
  <rect width="800" height="800" fill="url(#t-ritual)"/>
  <rect width="800" height="800" fill="url(#t-torch1)"/>
  <rect width="800" height="800" fill="url(#t-torch2)"/>
  <!-- Ritual circle -->
  <circle cx="400" cy="440" r="100" fill="none" stroke="#9b6bf6" stroke-width="1" opacity="0.07"/>
  <circle cx="400" cy="440" r="130" fill="none" stroke="#9b6bf6" stroke-width="0.5" opacity="0.05" stroke-dasharray="8 12"/>
  <!-- Pentagram hints -->
  <polygon points="400,340 440,430 490,460 440,490 400,540 360,490 310,460 360,430" fill="none" stroke="#9b6bf6" stroke-width="0.5" opacity="0.05"/>
  <!-- Banner poles -->
  <line x1="120" y1="150" x2="120" y2="700" stroke="#1a0d25" stroke-width="4" opacity="0.6"/>
  <line x1="680" y1="150" x2="680" y2="700" stroke="#1a0d25" stroke-width="4" opacity="0.6"/>
  <!-- Banner fabric -->
  <path d="M124,180 L124,380 Q150,360 175,380 L175,180 Z" fill="#1a0828" opacity="0.5"/>
  <path d="M676,180 L676,380 Q650,360 625,380 L625,180 Z" fill="#1a0828" opacity="0.5"/>
  <!-- Banner symbols -->
  <circle cx="149" cy="260" r="12" fill="none" stroke="#9b6bf6" stroke-width="1" opacity="0.1"/>
  <circle cx="651" cy="260" r="12" fill="none" stroke="#9b6bf6" stroke-width="1" opacity="0.1"/>
  <!-- Torch flames -->
  <ellipse cx="120" cy="140" rx="8" ry="14" fill="#9b6bf6" opacity="0.1"/>
  <ellipse cx="680" cy="140" rx="8" ry="14" fill="#9b6bf6" opacity="0.1"/>
  <!-- Ritual particles -->
  <circle cx="350" cy="400" r="1.5" fill="#9b6bf6" opacity="0.2"/>
  <circle cx="450" cy="380" r="1" fill="#c8a0ff" opacity="0.25"/>
  <circle cx="380" cy="500" r="1.5" fill="#9b6bf6" opacity="0.15"/>
  <circle cx="420" cy="350" r="1" fill="#c8a0ff" opacity="0.2"/>
  <circle cx="340" cy="470" r="1" fill="#9b6bf6" opacity="0.2"/>
  <circle cx="460" cy="480" r="1.5" fill="#c8a0ff" opacity="0.15"/>
</svg>
