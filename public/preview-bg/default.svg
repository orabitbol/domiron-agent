<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="d-bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#0e1018"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <radialGradient id="d-glow" cx="45%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#d4a843" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d-fog" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#080a10" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#080a10" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#d-bg)"/>
  <rect width="800" height="800" fill="url(#d-glow)"/>
  <!-- Strategic map grid -->
  <line x1="0" y1="160" x2="800" y2="160" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="640" x2="800" y2="640" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="160" y1="0" x2="160" y2="800" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="320" y1="0" x2="320" y2="800" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="480" y1="0" x2="480" y2="800" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <line x1="640" y1="0" x2="640" y2="800" stroke="#d4a843" stroke-width="0.3" opacity="0.03"/>
  <!-- Mountain silhouettes -->
  <polygon points="0,700 100,520 180,600 280,450 380,550 500,400 580,500 650,420 750,530 800,480 800,800 0,800" fill="#080a10" opacity="0.5"/>
  <polygon points="0,750 150,580 250,650 350,520 450,600 550,480 700,600 800,550 800,800 0,800" fill="#060810" opacity="0.6"/>
  <!-- Territory markers -->
  <circle cx="300" cy="350" r="3" fill="#d4a843" opacity="0.08"/>
  <circle cx="500" cy="280" r="3" fill="#c93545" opacity="0.08"/>
  <circle cx="200" cy="450" r="2.5" fill="#d4a843" opacity="0.06"/>
  <circle cx="600" cy="400" r="2.5" fill="#c93545" opacity="0.06"/>
  <circle cx="400" cy="380" r="4" fill="#d4a843" opacity="0.06" stroke="#d4a843" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Connecting lines (territory routes) -->
  <line x1="300" y1="350" x2="400" y2="380" stroke="#d4a843" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="380" x2="500" y2="280" stroke="#d4a843" stroke-width="0.5" opacity="0.04"/>
  <line x1="200" y1="450" x2="300" y2="350" stroke="#d4a843" stroke-width="0.5" opacity="0.03"/>
  <line x1="500" y1="280" x2="600" y2="400" stroke="#c93545" stroke-width="0.5" opacity="0.03"/>
  <!-- Bottom fog -->
  <rect width="800" height="800" fill="url(#d-fog)"/>
</svg>
